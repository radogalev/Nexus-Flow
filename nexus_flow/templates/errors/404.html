{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<section class="glass-card p-5 text-center">
  <h1 class="display-6 mb-2">404</h1>
  <p class="text-muted">The page you requested does not exist or was moved.</p>
  {% if request.user.is_authenticated %}
    <a class="btn btn-primary" href="{% url 'core:dashboard' %}">Back to dashboard</a>
  {% else %}
    <a class="btn btn-primary" href="{% url 'core:landing' %}">Back to landing</a>
  {% endif %}
</section>
{% endblock %}
