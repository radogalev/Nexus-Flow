{% extends 'base.html' %}
{% block title %}Delete Contract | NexusFlow{% endblock %}
{% block content %}
<section class="glass-card p-4">
  <h1 class="h4 text-danger">Delete contract</h1>
  <p>Deleting <strong>{{ object.title }}</strong> will also remove its uploaded document from storage.</p>
  <form method="post">
    {% csrf_token %}
    <a class="btn btn-outline-secondary" href="{% url 'contracts:detail' object.pk %}">Cancel</a>
    <button class="btn btn-danger" type="submit">Delete contract</button>
  </form>
</section>
{% endblock %}
