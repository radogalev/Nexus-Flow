{% extends 'base.html' %}
{% block title %}Delete Project | NexusFlow{% endblock %}
{% block content %}
<section class="glass-card p-4">
  <h1 class="h4 text-danger">Delete project</h1>
  <p>This will remove <strong>{{ object.title }}</strong> and detach {{ task_count }} related tasks from this view context.</p>
  <form method="post">
    {% csrf_token %}
    <a class="btn btn-outline-secondary" href="{% url 'projects:detail' object.slug %}">Cancel</a>
    <button class="btn btn-danger" type="submit">Delete project</button>
  </form>
</section>
{% endblock %}
