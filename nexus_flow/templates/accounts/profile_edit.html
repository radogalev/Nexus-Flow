{% extends 'base.html' %}
{% block title %}Edit Profile | NexusFlow{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <section class="glass-card p-4">
      <h1 class="h3 mb-3">Edit profile</h1>
      <p class="small text-muted mb-3">Email: {{ request.user.email }}</p>
      <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
          </div>
        {% endfor %}
        <img id="avatar-preview" class="img-thumbnail mb-3" style="max-width:120px;" {% if request.user.avatar %}src="{{ request.user.avatar.url }}"{% endif %} alt="Avatar preview">
        <div><button class="btn btn-primary" type="submit">Save changes</button></div>
      </form>
    </section>
  </div>
</div>
{% endblock %}
