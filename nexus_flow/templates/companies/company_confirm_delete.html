{% extends 'base.html' %}
{% block title %}Delete Company | NexusFlow{% endblock %}
{% block content %}
<section class="glass-card p-4">
  <h1 class="h4 text-danger">Delete company</h1>
  <p>You're about to delete <strong>{{ object.name }}</strong>. All linked employee company and department fields will be unset.</p>
  <form method="post">
    {% csrf_token %}
    <a class="btn btn-outline-secondary" href="{% url 'companies:detail' object.slug %}">Cancel</a>
    <button class="btn btn-danger" type="submit">Delete company</button>
  </form>
</section>
{% endblock %}
